name: Manual

# Builds the PDF version of the user manual.
#
# Started by hand only: Actions -> Manual -> "Run workflow".
# The PDF is always kept as a build artifact of the run. If a release tag is given when starting
# the workflow, the PDF is additionally attached to the assets of that release.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Attach the PDF to the release with this tag (empty: only build the artifact)'
        required: false
        default: ''

jobs:
  build:
    name: Build manual PDF
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write  # needed to attach the PDF to a release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # build-manual.sh takes the document date from the git history

      - name: Install pandoc and XeLaTeX
        # lmodern and fonts-lmodern are only 'Recommends' of the texlive packages, so they have
        # to be named explicitly here: pandoc's LaTeX template loads lmodern.sty unconditionally
        # and, on the XeTeX path, unicode-math needs latinmodern-math.otf from fonts-lmodern.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc texlive-xetex texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended lmodern fonts-lmodern

      - name: Build the PDF
        # called via bash so that it does not depend on the executable bit of the checkout
        run: bash doc/manual/build-manual.sh DABstar-Manual.pdf

      - uses: actions/upload-artifact@v4
        with:
          name: DABstar-Manual
          path: DABstar-Manual.pdf
          if-no-files-found: error

      - name: Attach the PDF to the release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ inputs.release_tag }}" DABstar-Manual.pdf --clobber
